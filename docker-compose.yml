services:
  web:
    build: .
    container_name: web
    command: >
      sh -c "python manage.py makemigrations --noinput &&
             python manage.py migrate --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - .:/app
      - ./back_static:/app/back_static
      - ./back_media:/app/back_media
      - ./sqlite_data:/app/sqlite_data
    expose:
      - "8000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.settings
    networks:
      - webnet

  nginx:
    image: nginx:alpine
    container_name: nginx
    volumes:
      - ./etc/nginx.conf:/etc/nginx/nginx.conf
      - ./back_static:/app/back_static
      - ./back_media:/app/back_media
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    networks:
      - webnet

networks:
  webnet:
    driver: bridge

volumes:
  static_volume:
  media_volume:
  sqlite_data:
