services:
  web:
    build: .
    container_name: web
    command: >
      sh -c "python manage.py makemigrations &&
             python manage.py migrate &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - .:/jashtar_kyimyly
      - ./back_static:/jashtar_kyimyly/back_static
      - ./back_media:/jashtar_kyimyly/back_media
      - ./sqlite_data:/app/sqlite_data
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.settings
      - ALLOWED_HOSTS=${ALLOWED_HOSTS}
    networks:
      - webnet

  nginx:
    image: nginx:alpine
    container_name: nginx
    volumes:
      - ./etc/nginx.conf:/etc/nginx/nginx.conf
      - ./back_static:/jashtar_kyimyly/back_static
      - ./back_media:/jashtar_kyimyly/back_media
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    networks:
      - webnet

networks:
  webnet:
    driver: bridge

volumes:
  static_volume:
  media_volume:
  sqlite_data: