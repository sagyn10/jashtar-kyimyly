server {
    listen 80;
    listen [::]:80;
    server_name jashtar-kyimyly.pp.ua www.jashtar-kyimyly.pp.ua api.jashtar-kyimyly.pp.ua;

    # Всё с 80 порта сразу редиректим на https
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name jashtar-kyimyly.pp.ua www.jashtar-kyimyly.pp.ua api.jashtar-kyimyly.pp.ua;

    include /config/nginx/site-confs/ssl/ssl.conf;

    client_max_body_size 100M;
    proxy_connect_timeout 600;
    proxy_send_timeout    600;
    proxy_read_timeout    600;
    send_timeout          600;

    # статика
    location /static/ {
        alias /app/back_static/;
    }

    # медиа
    location /media/ {
        alias /app/back_media/;
    }

    # swagger/docs
    location /docs/ {
        proxy_pass http://web:8000/docs/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # всё остальное — в Django
    location / {
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Ssl on;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_pass http://web:8000;
    }
}
